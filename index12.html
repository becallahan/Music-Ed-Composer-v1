<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Open.Music — index12</title>
<style>
:root{
  --bg0:#070c1d;
  --bg1:#0d1730;
  --bg2:#291b60;
  --purple:#6655ff;
  --purple2:#8d61ff;
  --blue:#2f8dff;
  --green:#40cc70;
  --orange:#f39a2f;
  --ink:#101624;
  --muted:#606b80;
  --line:#d8dfec;
  --soft:#f4f7fc;
  --paper:#ffffff;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  font-family:ui-rounded,"SF Pro Rounded","Aptos Rounded","Trebuchet MS",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  color:var(--ink);
  background:
    radial-gradient(circle at 16% 8%,rgba(106,84,255,.36),transparent 32%),
    radial-gradient(circle at 80% 12%,rgba(47,141,255,.28),transparent 30%),
    linear-gradient(135deg,var(--bg0),var(--bg2) 55%,var(--bg1));
}
button,select,input{font:inherit}
button{
  border:1px solid var(--line);
  border-radius:16px;
  background:#fff;
  color:var(--ink);
  font-weight:900;
  padding:12px 16px;
  cursor:pointer;
  box-shadow:0 10px 22px rgba(10,18,36,.10);
  touch-action:manipulation;
}
button:active{transform:translateY(1px)}
.app{min-height:100%;padding:18px;display:flex;flex-direction:column;gap:14px;max-width:1400px;margin:auto}
.topbar{
  color:white;
  display:grid;
  grid-template-columns:280px 1fr auto;
  gap:18px;
  align-items:center;
}
.brand{display:flex;gap:14px;align-items:center}
.logo{
  width:58px;height:58px;border-radius:18px;
  display:grid;place-items:center;
  background:linear-gradient(145deg,var(--purple2),var(--blue));
  font-size:36px;
  box-shadow:0 20px 44px rgba(47,141,255,.35);
}
.brand h1{font-size:32px;margin:0;letter-spacing:-.055em}
.brand p{margin:2px 0 0;color:#dfe7ff;line-height:1.25}
.transport{display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap}
.play{background:linear-gradient(145deg,var(--purple),var(--blue));color:white;border:0;font-size:19px;padding:17px 24px}
.stop{font-size:19px;padding:17px 24px}
.tempo{
  min-width:380px;
  height:64px;
  display:flex;align-items:center;gap:16px;
  padding:10px 18px;
  border-radius:20px;
  background:rgba(255,255,255,.10);
  border:1px solid rgba(255,255,255,.14);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.08);
}
.tempo label{font-size:18px;font-weight:900}
.tempo input{width:150px;accent-color:var(--purple)}
.tempo strong{font-size:24px;color:#6d80ff}
.view-toggle{
  display:flex;gap:5px;padding:5px;border-radius:18px;
  border:1px solid rgba(255,255,255,.16);
  background:rgba(6,10,25,.58);
}
.view-toggle button{background:transparent;border:0;color:white;box-shadow:none;padding:11px 15px;border-radius:13px}
.view-toggle button.active{background:linear-gradient(145deg,var(--purple),var(--blue))}
.icon-actions{display:flex;gap:15px;align-items:center}
.icon-actions button{
  background:transparent;border:0;color:white;box-shadow:none;
  display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 7px;border-radius:10px
}
.icon-actions .big{font-size:30px;line-height:1}
.icon-actions small{font-size:12px;color:#d9e1f5}

.shell{
  background:rgba(255,255,255,.96);
  border:1px solid rgba(255,255,255,.55);
  border-radius:24px;
  overflow:hidden;
  flex:1;
  box-shadow:0 30px 80px rgba(0,0,0,.34);
}
.tools{
  display:flex;
  flex-wrap:wrap;
  gap:14px;
  padding:18px;
  background:linear-gradient(180deg,#fff,#f7f9ff);
  border-bottom:1px solid var(--line);
}
.tool{
  min-width:126px;
  height:62px;
  display:flex;align-items:center;justify-content:center;gap:11px;
  border-radius:15px;
}
.tool .sym{font-size:31px;line-height:1}
.tool.active{color:#365cff;border-color:#526eff;box-shadow:0 0 0 4px rgba(82,110,255,.13)}
.content{
  display:grid;
  grid-template-columns:1fr 248px;
  gap:18px;
  padding:14px;
}
.work{}
.score-card{
  position:relative;
  min-height:350px;
  border:1px solid var(--line);
  border-radius:18px;
  overflow:hidden;
  background:#fff;
  box-shadow:0 14px 28px rgba(16,24,40,.07);
}
#score{position:relative;z-index:2;display:block;width:100%;height:350px;background:transparent}
.staff-html{
  position:absolute;z-index:1;left:28px;right:28px;top:108px;height:92px;pointer-events:none;
}
.staff-line{position:absolute;left:0;right:0;height:2px;background:#04070d}
.staff-line:nth-child(1){top:0}
.staff-line:nth-child(2){top:17px}
.staff-line:nth-child(3){top:34px}
.staff-line:nth-child(4){top:51px}
.staff-line:nth-child(5){top:68px}
.clef-html{
  position:absolute;left:11px;top:-10px;
  font-family:Georgia,"Times New Roman",serif;
  font-size:112px;line-height:1;color:#04070d
}
.time-html{
  position:absolute;left:118px;top:12px;
  font-size:39px;line-height:.86;font-weight:950;text-align:center;color:#04070d;
}
.cursor{
  position:absolute;
  z-index:4;
  top:75px;
  height:224px;
  width:3px;
  left:205px;
  background:#315eff;
  border-radius:99px;
  box-shadow:0 0 0 7px rgba(49,94,255,.12);
  pointer-events:none;
}
.cursor::before{
  content:"";position:absolute;left:50%;top:-12px;transform:translateX(-50%);
  border-left:8px solid transparent;border-right:8px solid transparent;border-top:14px solid #315eff;
}
.add-staff{
  position:absolute;z-index:3;left:26px;right:26px;bottom:24px;height:62px;
  border:2px dashed #d6deed;border-radius:18px;display:grid;place-items:center;
  color:#596579;font-weight:850;background:rgba(255,255,255,.65)
}
.piano-card{
  margin-top:16px;
  border:1px solid var(--line);
  border-radius:18px;
  overflow:hidden;background:white;
  box-shadow:0 14px 28px rgba(16,24,40,.06);
}
.piano-head{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 16px;border-bottom:1px solid var(--line);font-weight:950;
}
.piano-head .controls{display:flex;gap:18px;align-items:center;font-weight:800;color:#303a4d}
.piano-head select,.footer select{border:1px solid var(--line);border-radius:11px;padding:8px 12px;background:white;font-weight:850}
.switch{display:inline-block;width:38px;height:22px;border-radius:99px;background:linear-gradient(145deg,var(--purple),var(--blue));position:relative;vertical-align:middle}
.switch::after{content:"";width:17px;height:17px;background:white;border-radius:50%;position:absolute;right:3px;top:2.5px}
#pianoRoll{display:block;width:100%;height:215px;background:#fff}
.side{display:flex;flex-direction:column;gap:18px}
.card{
  background:linear-gradient(180deg,#fff,#f7f9ff);
  border:1px solid var(--line);
  border-radius:20px;
  padding:20px;
  box-shadow:0 18px 38px rgba(16,24,40,.10);
}
.nerd-face{
  color:#575cff;text-align:center;font-size:45px;letter-spacing:-.14em;font-weight:950;
  line-height:1;font-family:ui-rounded,"SF Pro Rounded","Arial Rounded MT Bold","Trebuchet MS",sans-serif;
  margin:3px 0 18px;
}
.card p{line-height:1.55;margin:0 0 10px;color:#202a3b;font-size:16px}
.lesson{
  border:2px solid #6655ff;
  min-height:232px;
}
.lesson h3{font-size:23px;color:#5a4dff;margin:0 0 12px}
.lesson .lesson-body{display:grid;grid-template-columns:48px 1fr;gap:14px;align-items:start}
.lesson .lesson-sym{font-size:52px;line-height:1;color:#05070d}
.lesson .nav{display:flex;align-items:center;justify-content:space-between;margin-top:22px}
.circleBtn{width:38px;height:38px;border-radius:50%;padding:0;display:grid;place-items:center;color:#5a4dff}
.dots{display:flex;gap:9px}.dot{width:9px;height:9px;border-radius:50%;background:#c6cede}.dot.active{background:#5a4dff}
.mini-nerd{
  margin-top:auto;align-self:flex-end;
  width:88px;height:88px;border-radius:32px;
  background:white;display:grid;place-items:center;
  color:#575cff;font-size:36px;font-weight:950;letter-spacing:-.14em;
  box-shadow:0 20px 42px rgba(16,24,40,.13);
}
.footer{
  display:flex;flex-wrap:wrap;gap:22px;align-items:center;
  padding:16px 18px;border-top:1px solid var(--line);background:#fbfcff
}
.volume{margin-left:auto;display:flex;gap:12px;align-items:center}.volume input{accent-color:var(--purple)}
.hidden{display:none!important}
@media(max-width:950px){
  .topbar{grid-template-columns:1fr}.transport{justify-content:flex-start}.icon-actions{justify-content:flex-start}
  .content{grid-template-columns:1fr}.tool{min-width:calc(50% - 8px)}.tempo{min-width:100%}
}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <div class="logo">♪</div>
      <div><h1>Open.Music</h1><p>A modern beginner<br/>composer for real notation.</p></div>
    </div>
    <div class="transport">
      <button id="playBtn" class="play">▶ Play</button>
      <button id="stopBtn" class="stop">■ Stop</button>
      <div class="tempo">
        <label>Tempo</label>
        <input id="tempo" type="range" min="40" max="200" value="90"/>
        <strong><span id="bpmNum">90</span> BPM</strong>
      </div>
      <div class="view-toggle">
        <button id="notationBtn" class="active">Notation</button>
        <button id="rollBtn">Piano Roll</button>
      </div>
    </div>
    <div class="icon-actions">
      <button id="undoBtn"><span class="big">↶</span><small>Undo</small></button>
      <button id="redoBtn"><span class="big">↷</span><small>Redo</small></button>
      <button id="midiBtn"><span class="big">▣</span><small>Save MIDI</small></button>
      <button id="settingsBtn"><span class="big">⚙</span><small>Settings</small></button>
    </div>
  </header>

  <main class="shell">
    <nav class="tools" id="toolbar">
      <button class="tool active" data-tool="select"><span class="sym">↖</span>Select</button>
      <button class="tool" data-tool="quarter"><span class="sym">♩</span>Quarter</button>
      <button class="tool" data-tool="eighth"><span class="sym">♫</span>Eighth</button>
      <button class="tool" data-tool="half"><span class="sym">𝅗𝅥</span>Half</button>
      <button class="tool" data-tool="whole"><span class="sym">𝅝</span>Whole</button>
      <button class="tool" data-tool="rest"><span class="sym">𝄽</span>Rest</button>
      <button class="tool" data-tool="tie"><span class="sym">⌒</span>Tie</button>
      <button class="tool" data-tool="harmony"><span class="sym">𝄞✦</span>Harmony</button>
    </nav>

    <section class="content">
      <section class="work">
        <div class="score-card">
          <div class="staff-html" aria-hidden="true">
            <div class="staff-line"></div><div class="staff-line"></div><div class="staff-line"></div><div class="staff-line"></div><div class="staff-line"></div>
            <div class="clef-html">𝄞</div>
            <div class="time-html"><div id="topTime">4</div><div id="bottomTime">4</div></div>
          </div>
          <svg id="score" viewBox="0 0 1180 350" preserveAspectRatio="none"></svg>
          <div class="cursor" id="cursor"></div>
          <div class="add-staff">+ Add staff (coming soon)</div>
        </div>

        <div class="piano-card" id="pianoPanel">
          <div class="piano-head">
            <span>⌄ Piano Roll</span>
            <span class="controls">Grid <select><option>1/4</option><option>1/8</option></select> Snap <span class="switch"></span></span>
          </div>
          <svg id="pianoRoll" viewBox="0 0 1180 215" preserveAspectRatio="none"></svg>
        </div>
      </section>

      <aside class="side">
        <div class="card">
          <div class="nerd-face">O‿O</div>
          <p><strong>Hi! I’m Music Nerd.</strong></p>
          <p>Need help? Click a tool any time.</p>
        </div>
        <div class="card lesson">
          <h3 id="helpTitle">Select</h3>
          <div class="lesson-body">
            <div class="lesson-sym" id="helpSymbol">↖</div>
            <div>
              <p id="helpText">Choose notes, move them, or inspect the score.</p>
              <p><strong>Tip:</strong> Notes sound when placed.</p>
            </div>
          </div>
          <div class="nav">
            <button class="circleBtn">‹</button>
            <div class="dots"><span class="dot active"></span><span class="dot"></span><span class="dot"></span></div>
            <button class="circleBtn">›</button>
          </div>
        </div>
        <div class="mini-nerd">O‿O</div>
      </aside>
    </section>

    <footer class="footer">
      <label>Key: <select id="keySelect"><option value="C">C Major</option><option value="Cm" selected>C Minor</option><option value="G">G Major</option><option value="F">F Major</option></select></label>
      <label>Time: <select id="timeSelect"><option value="4/4">4/4</option><option value="3/4" selected>3/4</option><option value="2/4">2/4</option></select></label>
      <label>Length: <select><option>1:1:000</option></select></label>
      <label>Voice: <select><option>1</option><option>2</option></select></label>
      <span class="volume">🔊 <input type="range" min="0" max="100" value="82"/> <strong>100%</strong></span>
    </footer>
  </main>
</div>

<script>
const score = document.getElementById("score");
const roll = document.getElementById("pianoRoll");
const cursor = document.getElementById("cursor");
const tempo = document.getElementById("tempo");
const bpmNum = document.getElementById("bpmNum");
const pianoPanel = document.getElementById("pianoPanel");
const notationBtn = document.getElementById("notationBtn");
const rollBtn = document.getElementById("rollBtn");
const timeSelect = document.getElementById("timeSelect");

let audioCtx;
let tool = "select";
let playing = false;
let history = [];
let redoStack = [];

let notes = [
  {p:60,b:0,d:.5},{p:62,b:.5,d:.5},{p:64,b:1,d:.5},{p:65,b:1.5,d:.5},{p:67,b:2,d:.5},{p:69,b:2.5,d:.5},
  {p:60,b:4,d:.5},{p:62,b:4.5,d:.5},{p:64,b:5,d:.5},{p:65,b:5.5,d:1},{p:67,b:6.5,d:.5},
  {p:69,b:8,d:1},{p:67,b:9,d:.5},{p:65,b:9.5,d:.5},{p:64,b:10,d:.5},{p:62,b:10.5,d:.5},{p:60,b:12,d:4}
];

const help = {
  select:["Select","↖","Choose notes, move them, or inspect the score."],
  quarter:["Quarter Note","♩","Duration: 1 beat. Click the staff to place it."],
  eighth:["Eighth Note","♫","Duration: 1/2 beat. Adjacent eighth notes beam automatically."],
  half:["Half Note","𝅗𝅥","Duration: 2 beats. Good for slower melody notes."],
  whole:["Whole Note","𝅝","Duration: 4 beats. It fills a full 4/4 measure."],
  rest:["Rest","𝄽","Adds silence at the clicked beat."],
  tie:["Tie","⌒","Connects matching pitches. Visual tie editing is coming next."],
  harmony:["Harmony","𝄞✦","Adds notes as another voice above or below the melody."]
};

function svg(name, attrs={}){
  const e=document.createElementNS("http://www.w3.org/2000/svg",name);
  for(const k in attrs) e.setAttribute(k,attrs[k]);
  return e;
}
function text(parent, str, attrs={}){
  const t=svg("text",attrs); t.textContent=str; parent.appendChild(t); return t;
}
function cloneNotes(){return JSON.parse(JSON.stringify(notes))}
function pushHistory(){history.push(cloneNotes()); if(history.length>60)history.shift(); redoStack=[]}

function xBeat(b){return 205 + b*58}
function yPitch(p){return 183 - (p-60)*8}
function beatFromX(x){return Math.max(0,Math.min(15.5,Math.round(((x-205)/58)*2)/2))}
function pitchFromY(y){return Math.max(60,Math.min(72,Math.round((183-y)/8+60)))}
function duration(){return {quarter:1,eighth:.5,half:2,whole:4,rest:1,harmony:1}[tool] || 1}

function timeParts(){
  const [top,bottom]=timeSelect.value.split("/").map(Number);
  return {top,bottom};
}

function renderScore(){
  score.innerHTML="";
  const staffTop=118, gap=17;
  const {top,bottom}=timeParts();
  document.getElementById("topTime").textContent=top;
  document.getElementById("bottomTime").textContent=bottom;

  // measure numbers and barlines on top of fallback staff
  const measureBeats=top;
  for(let m=0;m<=4;m++){
    const x=xBeat(m*measureBeats)-18;
    score.appendChild(svg("line",{x1:x,y1:staffTop,x2:x,y2:staffTop+gap*4,stroke:"#04070d","stroke-width":m===4?5:1.6}));
    if(m<4) text(score,String(m+1),{x:x+6,y:82,"font-size":16,"font-weight":850,fill:"#101624"});
  }

  // key signature like the mockup when C minor is selected
  if(document.getElementById("keySelect").value==="Cm"){
    [["♭",124,136],["♭",154,149],["♭",184,132]].forEach(([s,x,y])=>{
      text(score,s,{x,y,"font-size":42,"font-family":"Georgia,serif",fill:"#05070d"});
    });
  }

  const eighthGroups={};
  notes.forEach((n,i)=>{
    const x=xBeat(n.b), y=yPitch(n.p);
    if(n.rest){
      text(score,"𝄽",{x:x-10,y:staffTop+47,"font-size":34,fill:"#05070d"});
      return;
    }

    if(n.d>=4){
      score.appendChild(svg("ellipse",{cx:x,cy:y,rx:14,ry:8,fill:"white",stroke:"#05070d","stroke-width":4,transform:`rotate(-15 ${x} ${y})`}));
      return;
    }

    score.appendChild(svg("ellipse",{cx:x,cy:y,rx:10,ry:7,fill:n.d>=2?"white":"#05070d",stroke:"#05070d","stroke-width":3,transform:`rotate(-16 ${x} ${y})`}));
    score.appendChild(svg("line",{x1:x+9,y1:y,x2:x+9,y2:y-48,stroke:"#05070d","stroke-width":3}));

    if(n.d===.5){
      const group=Math.floor(n.b);
      if(!eighthGroups[group])eighthGroups[group]=[];
      eighthGroups[group].push({x,y,b:n.b});
    } else if(n.d===1){
      score.appendChild(svg("path",{d:`M ${x+9} ${y-48} q 20 6 31 18`,fill:"none",stroke:"#05070d","stroke-width":3}));
    } else if(n.d===2){
      // half note no flag
    }
  });

  Object.values(eighthGroups).forEach(group=>{
    group.sort((a,b)=>a.b-b.b);
    for(let i=0;i<group.length-1;i++){
      const a=group[i], b=group[i+1];
      if(Math.abs(b.b-a.b)<=.5){
        const y=Math.min(a.y,b.y)-48;
        score.appendChild(svg("line",{x1:a.x+9,y1:y,x2:b.x+9,y2:y,stroke:"#05070d","stroke-width":7}));
      }
    }
  });

  // sample ties
  [[6,7],[8.2,9.2]].forEach(pair=>{
    score.appendChild(svg("path",{d:`M ${xBeat(pair[0])} 205 C ${xBeat(pair[0]+.35)} 221 ${xBeat(pair[1]-.35)} 221 ${xBeat(pair[1])} 205`,fill:"none",stroke:"#05070d","stroke-width":3}));
  });
}

function renderRoll(){
  roll.innerHTML="";
  const labels=["C5","B4","A4","G4","F4","E4","D4","C4"];
  labels.forEach((name,i)=>{
    const y=24+i*23;
    roll.appendChild(svg("line",{x1:86,y1:y+10,x2:1160,y2:y+10,stroke:"#e8ecf4","stroke-width":1}));
    text(roll,name,{x:52,y:y+16,"font-size":14,fill:"#101624"});
    if(i%2===0) roll.appendChild(svg("rect",{x:0,y:y+3,width:44,height:11,rx:2,fill:"#171b25"}));
  });
  for(let b=0;b<=16;b++){
    const x=xBeat(b)-86;
    roll.appendChild(svg("line",{x1:x,y1:18,x2:x,y2:200,stroke:b%4===0?"#cfd7e6":"#eef2f8","stroke-width":b%4===0?1.4:1}));
    if(b%4===0 && b<16) text(roll,String(b/4+1),{x:x+6,y:18,"font-size":14,fill:"#101624"});
  }
  notes.forEach((n,i)=>{
    if(n.rest)return;
    const x=xBeat(n.b)-86;
    const y=188-(n.p-60)*11;
    const w=Math.max(32,n.d*56);
    const fill=i%4===0?"#63bd5e":i%4===1?"#6f86f7":i%4===2?"#a15be9":"#f39a2f";
    roll.appendChild(svg("rect",{x,y,width:w,height:12,rx:4,fill,opacity:.94}));
  });
}

function beep(midi,seconds=.18){
  audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)();
  const osc=audioCtx.createOscillator(), gain=audioCtx.createGain();
  osc.type="sine";
  osc.frequency.value=440*Math.pow(2,(midi-69)/12);
  gain.gain.setValueAtTime(.001,audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(.16,audioCtx.currentTime+.012);
  gain.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+seconds);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime+seconds+.03);
}

score.addEventListener("click",ev=>{
  if(tool==="select"||tool==="tie")return;
  const r=score.getBoundingClientRect();
  const x=(ev.clientX-r.left)/r.width*1180;
  const y=(ev.clientY-r.top)/r.height*350;
  const b=beatFromX(x), p=pitchFromY(y);
  pushHistory();
  if(tool==="rest"){notes.push({p,b,d:1,rest:true})}
  else{notes.push({p,b,d:duration()});beep(p)}
  renderScore();renderRoll();
});

document.getElementById("toolbar").addEventListener("click",ev=>{
  const btn=ev.target.closest(".tool"); if(!btn)return;
  document.querySelectorAll(".tool").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  tool=btn.dataset.tool;
  const h=help[tool];
  document.getElementById("helpTitle").textContent=h[0];
  document.getElementById("helpSymbol").textContent=h[1];
  document.getElementById("helpText").textContent=h[2];
});

tempo.addEventListener("input",()=>bpmNum.textContent=tempo.value);
document.getElementById("keySelect").addEventListener("change",renderScore);
timeSelect.addEventListener("change",renderScore);

notationBtn.onclick=()=>{
  pianoPanel.classList.add("hidden");
  notationBtn.classList.add("active");
  rollBtn.classList.remove("active");
};
rollBtn.onclick=()=>{
  pianoPanel.classList.remove("hidden");
  rollBtn.classList.add("active");
  notationBtn.classList.remove("active");
};

document.getElementById("undoBtn").onclick=()=>{
  if(!history.length)return;
  redoStack.push(cloneNotes());
  notes=history.pop();
  renderScore();renderRoll();
};
document.getElementById("redoBtn").onclick=()=>{
  if(!redoStack.length)return;
  history.push(cloneNotes());
  notes=redoStack.pop();
  renderScore();renderRoll();
};

document.getElementById("playBtn").onclick=()=>{
  playing=true;
  const bpm=Number(tempo.value), start=performance.now(), total=16;
  notes.forEach(n=>{
    if(n.rest)return;
    setTimeout(()=>beep(n.p,Math.min(.75,n.d*60/bpm*.78)),n.b*60000/bpm);
  });
  function frame(now){
    if(!playing)return;
    const beat=(now-start)/(60000/bpm);
    const px=xBeat(Math.min(beat,total));
    cursor.style.left=(px/1180*100)+"%";
    const rollCursor=Math.max(0,px-86);
    if(beat<total)requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
};
document.getElementById("stopBtn").onclick=()=>{playing=false;cursor.style.left="205px"};

function varlen(v){
  let buffer=v&0x7F; while(v>>=7){buffer<<=8;buffer|=((v&0x7F)|0x80)}
  const out=[]; while(true){out.push(buffer&255); if(buffer&0x80)buffer>>=8; else break} return out;
}
function saveMidi(){
  const ppq=480, bpm=Number(tempo.value), micros=Math.round(60000000/bpm);
  const events=[{t:0,b:[0xFF,0x51,0x03,(micros>>16)&255,(micros>>8)&255,micros&255]}];
  notes.forEach(n=>{
    if(n.rest)return;
    events.push({t:Math.round(n.b*ppq),b:[0x90,n.p,90]});
    events.push({t:Math.round((n.b+n.d)*ppq),b:[0x80,n.p,0]});
  });
  events.sort((a,b)=>a.t-b.t||a.b[0]-b.b[0]);
  let tr=[],last=0; events.forEach(e=>{tr.push(...varlen(e.t-last),...e.b); last=e.t});
  tr.push(0,0xFF,0x2F,0);
  const head=[77,84,104,100,0,0,0,6,0,0,0,1,(ppq>>8)&255,ppq&255];
  const len=tr.length;
  const track=[77,84,114,107,(len>>24)&255,(len>>16)&255,(len>>8)&255,len&255,...tr];
  const blob=new Blob([new Uint8Array([...head,...track])],{type:"audio/midi"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="open-music-composition.mid";
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
document.getElementById("midiBtn").onclick=saveMidi;
document.getElementById("settingsBtn").onclick=()=>alert("Settings panel coming soon. Tempo stays on the main screen.");

renderScore();
renderRoll();
</script>
