<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Open.Music — index11</title>
<style>
:root{
  --ink:#101624; --muted:#667085; --line:#d9dee8; --panel:#ffffff;
  --blue:#3b6df6; --violet:#7b61ff; --green:#3fbe6a; --gold:#f0a63a;
  --bg1:#0f172a; --bg2:#241b52; --soft:#f6f8fc;
}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,ui-rounded,"SF Pro Rounded",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(135deg,var(--bg1),var(--bg2));color:var(--ink)}
.app{min-height:100vh;display:flex;flex-direction:column}
.top{
  display:grid;grid-template-columns:280px 1fr auto;gap:18px;align-items:center;
  padding:18px 22px;color:white;background:rgba(5,10,24,.72);backdrop-filter:blur(10px)
}
.brand{display:flex;align-items:center;gap:14px}.logo{width:54px;height:54px;border-radius:17px;background:linear-gradient(145deg,var(--blue),var(--violet));display:grid;place-items:center;font-size:32px;box-shadow:0 12px 30px rgba(59,109,246,.3)}
.brand h1{font-size:29px;margin:0;letter-spacing:-.04em}.brand p{margin:2px 0 0;color:#dce4f5}
.transport{display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap}
button,.tool{border:1px solid var(--line);background:white;color:#121826;border-radius:14px;padding:12px 16px;font-weight:800;cursor:pointer;box-shadow:0 8px 20px rgba(16,24,40,.06)}
button:hover,.tool:hover{transform:translateY(-1px)}
.play{background:linear-gradient(145deg,#4bd36d,#35aa5d);color:white;border:0;font-size:18px}.stop{font-size:18px}
.tempo{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:10px 18px;min-width:360px}
.tempo strong{font-size:44px;line-height:.8}.tempo span{font-weight:700}.tempo input{width:180px}
.viewtoggle{display:flex;background:#0d1323;border:1px solid rgba(255,255,255,.16);padding:5px;border-radius:16px}
.viewtoggle button{box-shadow:none;border:0;background:transparent;color:white;padding:10px 14px}.viewtoggle .active{background:var(--blue)}
.actions{display:flex;gap:12px}.actions button{background:transparent;color:white;border-color:rgba(255,255,255,.2);box-shadow:none}
.workspace{display:grid;grid-template-columns:1fr 250px;gap:18px;padding:18px;flex:1}
.main{background:rgba(255,255,255,.96);border-radius:20px;padding:16px;box-shadow:0 20px 50px rgba(0,0,0,.22)}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin:0 0 14px}.tool.active{outline:3px solid rgba(59,109,246,.18);border-color:var(--blue);color:var(--blue)}
.scorewrap{position:relative;border:1px solid var(--line);border-radius:18px;overflow:hidden;background:white;padding:18px;min-height:300px}
#score{width:100%;height:280px;display:block}
.cursor{position:absolute;top:52px;bottom:46px;width:3px;background:var(--blue);left:145px;box-shadow:0 0 0 6px rgba(59,109,246,.08);border-radius:3px;pointer-events:none}
.piano{margin-top:14px;border:1px solid var(--line);border-radius:16px;overflow:hidden;background:#fbfcff}
.pianoHead{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--line);font-weight:900}
#pianoRoll{width:100%;height:210px;display:block;background:#fff}
.side{display:flex;flex-direction:column;gap:16px}
.nerdCard,.helpCard{background:rgba(255,255,255,.94);border:1px solid rgba(255,255,255,.35);border-radius:20px;padding:20px;box-shadow:0 20px 45px rgba(0,0,0,.18)}
.nerdFace{font-size:44px;font-weight:950;letter-spacing:-.13em;color:var(--blue);text-align:center;margin-bottom:12px;font-family:ui-rounded,"SF Pro Rounded","Arial Rounded MT Bold",sans-serif}
.nerdCard p{font-size:17px;line-height:1.55;margin:0;color:#2a3344}.miniNerd{position:fixed;right:20px;bottom:20px;background:white;color:var(--blue);border-radius:24px;padding:18px 22px;font-size:34px;font-weight:950;letter-spacing:-.13em;box-shadow:0 18px 40px rgba(0,0,0,.22);z-index:40}
.helpCard h3{margin:0 0 10px;color:var(--blue)}.helpCard p{margin:6px 0;line-height:1.45}
.footer{display:flex;gap:24px;align-items:center;padding:14px 24px;color:white;background:rgba(5,10,24,.72)}
select{border:1px solid var(--line);border-radius:10px;padding:8px 10px;font-weight:700}
.hidden{display:none}
@media(max-width:900px){.top{grid-template-columns:1fr}.workspace{grid-template-columns:1fr}.actions{justify-content:center}.tempo{min-width:0;width:100%}.side{grid-row:auto}}
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="brand"><div class="logo">♪</div><div><h1>Open.Music</h1><p>Compose. Learn. Share.</p></div></div>
    <div class="transport">
      <button class="play" id="playBtn">▶ Play</button><button class="stop" id="stopBtn">■ Stop</button>
      <div class="tempo"><div><small>TEMPO</small><br><strong id="bpmNum">90</strong> <span>BPM</span></div><input id="tempo" type="range" min="40" max="200" value="90"></div>
      <div class="viewtoggle"><button id="notationBtn" class="active">Notation</button><button id="rollBtn">Piano Roll</button></div>
    </div>
    <div class="actions"><button id="undoBtn">↶ Undo</button><button id="midiBtn">▣ Save MIDI</button><button id="settingsBtn">⚙ Settings</button></div>
  </header>

  <section class="workspace">
    <main class="main">
      <div class="toolbar" id="toolbar">
        <button class="tool active" data-tool="select">↖ Select</button>
        <button class="tool" data-tool="quarter">♩ Quarter</button>
        <button class="tool" data-tool="eighth">♫ Eighth</button>
        <button class="tool" data-tool="half">𝅗𝅥 Half</button>
        <button class="tool" data-tool="whole">𝅝 Whole</button>
        <button class="tool" data-tool="rest">𝄽 Rest</button>
        <button class="tool" data-tool="tie">⌒ Tie</button>
        <button class="tool" data-tool="harmony">𝄞 Harmony</button>
      </div>
      <div class="scorewrap" id="scorewrap">
        <svg id="score" viewBox="0 0 1180 280" preserveAspectRatio="none"></svg>
        <div class="cursor" id="cursor"></div>
      </div>
      <div class="piano" id="pianoPanel">
        <div class="pianoHead"><span>⌄ Piano Roll</span><span>Grid <select><option>1/4</option><option>1/8</option></select> Snap ●</span></div>
        <svg id="pianoRoll" viewBox="0 0 1180 210" preserveAspectRatio="none"></svg>
      </div>
    </main>
    <aside class="side">
      <div class="nerdCard"><div class="nerdFace">O‿O</div><p>Hi! I’m Music Nerd. I’ll stay out of the way and explain the selected tool.</p></div>
      <div class="helpCard"><h3 id="helpTitle">Select</h3><p id="helpText">Choose notes, move them, or inspect the score.</p><p><strong>Tip:</strong> Notes sound when placed.</p></div>
    </aside>
  </section>
  <div class="footer">Key: <select><option>C Major</option></select> Time: <select><option>4/4</option></select> Length: <strong id="len">1:1:000</strong> Voice: <select><option>1</option><option>2</option></select></div>
</div>
<div class="miniNerd">O‿O</div>
<script>
const score = document.getElementById('score'), roll=document.getElementById('pianoRoll'), cursor=document.getElementById('cursor');
const help={select:['Select','Choose notes, move them, or inspect the score.'],quarter:['Quarter Note','Duration: 1 beat. Click the staff to place.'],eighth:['Eighth Note','Duration: 1/2 beat. Neighboring eighth notes beam automatically.'],half:['Half Note','Duration: 2 beats.'],whole:['Whole Note','Duration: 4 beats.'],rest:['Rest','Adds silence for the chosen duration.'],tie:['Tie','Connect notes of the same pitch, including across barlines.'],harmony:['Harmony Mode','Add another voice above or below the melody.']};
let tool='select', notes=[
 {p:60,b:.0,d:.5},{p:62,b:.5,d:.5},{p:64,b:1,d:.5},{p:65,b:1.5,d:.5},{p:67,b:2,d:.5},{p:67,b:2.5,d:.5},
 {p:60,b:4,d:.5},{p:62,b:4.5,d:.5},{p:64,b:5,d:.5},{p:65,b:5.5,d:1},{p:67,b:6.5,d:.5},
 {p:69,b:8,d:1},{p:67,b:9,d:.5},{p:65,b:9.5,d:.5},{p:64,b:10,d:.5},{p:60,b:10.5,d:1.5}
], history=[], playing=false, ac;
function xBeat(b){return 150+b*82} function yPitch(p){return 182-(p-60)*9}
function el(n,a={}){let e=document.createElementNS('http://www.w3.org/2000/svg',n);for(let k in a)e.setAttribute(k,a[k]);return e}
function renderScore(){
 score.innerHTML='';
 for(let i=0;i<5;i++) score.append(el('line',{x1:20,y1:95+i*18,x2:1150,y2:95+i*18,stroke:'#111', 'stroke-width':1.2}));
 score.append(el('text',{x:35,y:158,'font-size':92,'font-family':'Georgia,serif'})).textContent='𝄞';
 score.append(el('text',{x:98,y:142,'font-size':46,'font-weight':'800'})).textContent='4';
 score.append(el('text',{x:98,y:178,'font-size':46,'font-weight':'800'})).textContent='4';
 for(let m=0;m<=4;m++){let x=xBeat(m*4)-18;score.append(el('line',{x1:x,y1:95,x2:x,y2:167,stroke:'#111','stroke-width':m==4?5:1.4})); if(m<4){score.append(el('text',{x:x+6,y:70,'font-size':18})).textContent=m+1}}
 let eighths=[];
 notes.forEach((n,i)=>{
   let x=xBeat(n.b), y=yPitch(n.p);
   if(n.d>=4){score.append(el('ellipse',{cx:x,cy:y,rx:17,ry:9,fill:'none',stroke:'#111','stroke-width':4,transform:`rotate(-12 ${x} ${y})`}));return}
   score.append(el('ellipse',{cx:x,cy:y,rx:10,ry:7,fill:n.d>=2?'white':'#111',stroke:'#111','stroke-width':3,transform:`rotate(-18 ${x} ${y})`}));
   if(n.d<4){score.append(el('line',{x1:x+9,y1:y,x2:x+9,y2:y-48,stroke:'#111','stroke-width':3}));}
   if(n.d===.5) eighths.push({x,y,b:n.b});
   if(n.d===1) score.append(el('line',{x1:x+9,y1:y-48,x2:x+42,y2:y-48,stroke:'#111','stroke-width':7}));
 });
 // beam adjacent eighths within beats
 for(let i=0;i<eighths.length;i+=2){let a=eighths[i],b=eighths[i+1]; if(b && Math.floor(a.b)===Math.floor(b.b)){score.append(el('line',{x1:a.x+9,y1:a.y-48,x2:b.x+9,y2:b.y-48,stroke:'#111','stroke-width':7}))}}
 score.append(el('path',{d:`M ${xBeat(5.5)} 180 C ${xBeat(6)} 198 ${xBeat(6.5)} 198 ${xBeat(7)} 180`,fill:'none',stroke:'#111','stroke-width':3}));
 score.append(el('path',{d:`M ${xBeat(8)} 180 C ${xBeat(8.6)} 198 ${xBeat(9.2)} 198 ${xBeat(10)} 180`,fill:'none',stroke:'#111','stroke-width':3}));
}
function renderRoll(){
 roll.innerHTML=''; let names=['C5','B4','A4','G4','F4','E4','D4','C4'];
 names.forEach((name,i)=>{let y=22+i*23;roll.append(el('line',{x1:90,y1:y+10,x2:1160,y2:y+10,stroke:'#e6e9f0'})); let t=el('text',{x:50,y:y+16,'font-size':15});t.textContent=name;roll.append(t)});
 for(let b=0;b<=16;b++){let x=xBeat(b/1)-60; roll.append(el('line',{x1:x,y1:20,x2:x,y2:198,stroke:b%4==0?'#cfd5e3':'#eef1f6'}));}
 notes.forEach((n,i)=>{let x=xBeat(n.b)-60,y=180-(n.p-60)*11;roll.append(el('rect',{x:x,y:y,width:Math.max(32,n.d*70),height:12,rx:4,fill:i%3==0?'#65b95c':i%3==1?'#6b8df6':'#9b60e8',opacity:.92}))})
}
function beep(midi,d=.18){ac=ac||new (window.AudioContext||window.webkitAudioContext)();let o=ac.createOscillator(),g=ac.createGain();o.type='sine';o.frequency.value=440*Math.pow(2,(midi-69)/12);g.gain.setValueAtTime(.001,ac.currentTime);g.gain.exponentialRampToValueAtTime(.18,ac.currentTime+.01);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+d);o.connect(g).connect(ac.destination);o.start();o.stop(ac.currentTime+d+.02)}
score.addEventListener('click',e=>{if(tool==='select'||tool==='tie')return; let r=score.getBoundingClientRect(),x=(e.clientX-r.left)/r.width*1180,y=(e.clientY-r.top)/r.height*280;let b=Math.max(0,Math.min(15.5,Math.round(((x-150)/82)*2)/2));let p=Math.max(60,Math.min(72,Math.round((182-y)/9+60)));let dur={quarter:1,eighth:.5,half:2,whole:4,rest:1,harmony:1}[tool]||1;history.push([...notes]);notes.push({p,b,d:dur});beep(p);renderScore();renderRoll()});
document.getElementById('toolbar').onclick=e=>{let b=e.target.closest('.tool');if(!b)return;document.querySelectorAll('.tool').forEach(t=>t.classList.remove('active'));b.classList.add('active');tool=b.dataset.tool;document.getElementById('helpTitle').textContent=help[tool][0];document.getElementById('helpText').textContent=help[tool][1]}
document.getElementById('tempo').oninput=e=>document.getElementById('bpmNum').textContent=e.target.value;
document.getElementById('undoBtn').onclick=()=>{if(history.length){notes=history.pop();renderScore();renderRoll()}};
document.getElementById('rollBtn').onclick=()=>{document.getElementById('pianoPanel').classList.remove('hidden');rollBtn.classList.add('active');notationBtn.classList.remove('active')};
document.getElementById('notationBtn').onclick=()=>{document.getElementById('pianoPanel').classList.add('hidden');notationBtn.classList.add('active');rollBtn.classList.remove('active')};
document.getElementById('playBtn').onclick=()=>{playing=true;let bpm=+tempo.value, start=performance.now(), total=16;notes.forEach(n=>setTimeout(()=>beep(n.p,Math.min(.7,n.d*60/bpm*.8)),n.b*60000/bpm));function anim(now){if(!playing)return;let beat=(now-start)/(60000/bpm);cursor.style.left=(150+beat*82)/1180*100+'%'; if(beat<total)requestAnimationFrame(anim)}requestAnimationFrame(anim)};
document.getElementById('stopBtn').onclick=()=>playing=false;
document.getElementById('midiBtn').onclick=()=>{alert('MIDI export button is wired as a placeholder in this prototype. Next pass can write a true .mid file download.')};
renderScore();renderRoll();
</script>
</body>
</html>
