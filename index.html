<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Open.Music Composer</title>
<style>
  :root{--cream:#f6edd6;--paper:#fffaf0;--ink:#191919;--gray:#d8d3c4;--red:#8f1d2c;--mustard:#d49a24;--green:#2f8f46;--shadow:#2b2b2b}
  *{box-sizing:border-box} body{margin:0;background:var(--cream);color:var(--ink);font-family:"Courier New",monospace;image-rendering:pixelated}
  header{border-bottom:5px solid var(--ink);background:var(--red);color:white;padding:14px 16px;box-shadow:0 5px 0 var(--mustard)}
  h1{margin:0;font-size:30px;letter-spacing:1px;text-shadow:3px 3px 0 #000}.tag{font-size:13px;color:#ffe6ad}
  main{max-width:1200px;margin:18px auto;padding:0 12px}.panel{background:var(--paper);border:5px solid var(--ink);box-shadow:7px 7px 0 var(--shadow);padding:12px;margin-bottom:18px}
  .top{display:grid;grid-template-columns:1fr 210px;gap:16px}canvas{width:100%;background:#fffdf4;border:4px solid var(--ink);display:block}
  .nerd{background:#f9e9b9;border:4px solid var(--ink);padding:10px;min-height:170px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
  .violin{font-size:58px}.glasses{font-size:28px;margin-top:-18px;letter-spacing:6px}.bubble{font-size:13px;line-height:1.25}
  button{font-family:inherit;font-weight:bold;font-size:14px;padding:9px 10px;margin:4px;border:4px solid var(--ink);background:var(--gray);box-shadow:4px 4px 0 var(--ink);cursor:pointer}
  button.active{background:var(--mustard)}button.good{background:var(--green);color:white}.controls{display:flex;flex-wrap:wrap;gap:6px;align-items:center}.label{font-weight:bold;margin-right:6px}
  .grid{display:grid;grid-template-columns:repeat(16,1fr);gap:6px;margin-top:12px}.cell{min-height:58px;background:#fff;border:4px solid var(--ink);box-shadow:3px 3px 0 var(--shadow);display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:bold;position:relative;cursor:pointer;text-align:center;font-size:13px}
  .cell:nth-child(4n){border-right:7px solid var(--red)}.beat{position:absolute;top:2px;left:4px;font-size:10px;color:#666}.notes{font-size:16px}.dur{font-size:16px;color:var(--red)}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px;margin-top:10px}.stat{background:#eee2bf;border:4px solid var(--ink);padding:8px;font-weight:bold}.ok{color:var(--green)}.warn{color:var(--red)}
  @media(max-width:800px){.top{grid-template-columns:1fr}.grid{grid-template-columns:repeat(8,1fr)}}
</style>
</head>
<body>
<header><h1>Open.Music</h1><div class="tag">Oregon-trail-ish pixel composer • real treble-clef notation • middle C to high C</div></header>
<main>
<section class="panel top"><canvas id="staff" width="1120" height="360"></canvas><aside class="nerd"><div class="violin">🎻</div><div class="glasses">◉-◉</div><div class="bubble" id="coach">Music Nerd says: choose a note, choose a rhythm, then tap the grid.</div></aside></section>
<section class="panel">
<div class="controls"><span class="label">Note:</span>
<button class="note active" data-note="C4">C</button><button class="note" data-note="D4">D</button><button class="note" data-note="E4">E</button><button class="note" data-note="F4">F</button><button class="note" data-note="G4">G</button><button class="note" data-note="A4">A</button><button class="note" data-note="B4">B</button><button class="note" data-note="C5">C</button><button class="note" data-note="D5">D</button><button class="note" data-note="E5">E</button><button class="note" data-note="F5">F</button><button class="note" data-note="G5">G</button><button class="note" data-note="A5">A</button><button class="note" data-note="B5">B</button><button class="note" data-note="C6">C</button>
</div>
<div class="controls"><span class="label">Rhythm:</span><button class="rhythm active" data-dur="0.5" data-symbol="♪">♪ single eighth</button><button class="rhythm" data-dur="1" data-symbol="♩">♩ quarter</button><button class="rhythm" data-dur="2" data-symbol="𝅗𝅥">𝅗𝅥 half</button><button class="rhythm" data-dur="4" data-symbol="𝅝">𝅝 whole</button><button id="restBtn">Rest</button><button id="stackBtn">Harmony Stack: OFF</button><button id="eraseBtn">Erase</button><button id="playBtn" class="good">Play</button><button id="clearBtn">Clear</button></div>
<div class="grid" id="grid"></div><div class="stats"><div class="stat" id="meter"></div><div class="stat" id="quality"></div><div class="stat" id="harmony"></div></div>
</section></main>
<script>
const canvas=document.getElementById("staff"),ctx=canvas.getContext("2d"),grid=document.getElementById("grid"),coach=document.getElementById("coach");
const notes={C4:{name:"C",step:0,freq:261.63},D4:{name:"D",step:1,freq:293.66},E4:{name:"E",step:2,freq:329.63},F4:{name:"F",step:3,freq:349.23},G4:{name:"G",step:4,freq:392},A4:{name:"A",step:5,freq:440},B4:{name:"B",step:6,freq:493.88},C5:{name:"C",step:7,freq:523.25},D5:{name:"D",step:8,freq:587.33},E5:{name:"E",step:9,freq:659.25},F5:{name:"F",step:10,freq:698.46},G5:{name:"G",step:11,freq:783.99},A5:{name:"A",step:12,freq:880},B5:{name:"B",step:13,freq:987.77},C6:{name:"C",step:14,freq:1046.5}};
const pc={C:0,D:2,E:4,F:5,G:7,A:9,B:11};let selectedNote="C4",selectedDur=.5,selectedSymbol="♪",restMode=false,eraseMode=false,stackMode=false;
let cells=Array.from({length:16},()=>({notes:[],dur:.5,symbol:"♪",rest:false}));
function noteY(n){return 220-(notes[n].step-2)*11}
function drawStaff(){ctx.clearRect(0,0,1120,360);ctx.fillStyle="#fffdf4";ctx.fillRect(0,0,1120,360);let left=70,right=1060,top=132,space=22;ctx.strokeStyle="#191919";ctx.lineWidth=4;for(let i=0;i<5;i++){ctx.beginPath();ctx.moveTo(left,top+i*space);ctx.lineTo(right,top+i*space);ctx.stroke()}ctx.font="118px Georgia";ctx.fillStyle="#191919";ctx.fillText("𝄞",82,232);for(let m=0;m<=4;m++){let x=210+m*((right-210)/4);ctx.lineWidth=m==4?6:3;ctx.beginPath();ctx.moveTo(x,top);ctx.lineTo(x,top+4*space);ctx.stroke()}let sx=245,bw=(right-sx-25)/16;cells.forEach((c,i)=>{let x=sx+i*bw+bw/2;ctx.fillStyle="#191919";ctx.font="14px Courier New";ctx.fillText((i%4)+1,x-4,112);if(c.rest){ctx.font="34px Georgia";ctx.fillText("𝄽",x-11,175);return}if(!c.notes.length)return;[...c.notes].sort((a,b)=>notes[b].step-notes[a].step).forEach((n,k)=>{let y=noteY(n),xo=x+(k%2?10:0);ledger(xo,y);head(xo,y,c.dur);if(c.dur<=2)stem(xo,y);if(c.dur===.5)flag(xo,y)});if(c.notes.length>1){ctx.fillStyle="#8f1d2c";ctx.font="13px Courier New";ctx.fillText(chordName(c.notes),x-22,285)}})}
function ledger(x,y){let top=132,bottom=220,space=22;ctx.strokeStyle="#191919";ctx.lineWidth=3;for(let ly=bottom+space;ly<=y+1;ly+=space){ctx.beginPath();ctx.moveTo(x-22,ly);ctx.lineTo(x+22,ly);ctx.stroke()}for(let ly=top-space;ly>=y-1;ly-=space){ctx.beginPath();ctx.moveTo(x-22,ly);ctx.lineTo(x+22,ly);ctx.stroke()}}
function head(x,y,d){ctx.save();ctx.translate(x,y);ctx.rotate(-.25);ctx.beginPath();ctx.ellipse(0,0,14,10,0,0,Math.PI*2);d>=2?(ctx.lineWidth=4,ctx.stroke()):ctx.fill();ctx.restore()}
function stem(x,y){ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(x+12,y);ctx.lineTo(x+12,y-62);ctx.stroke()}function flag(x,y){ctx.beginPath();ctx.moveTo(x+12,y-62);ctx.quadraticCurveTo(x+44,y-45,x+20,y-28);ctx.stroke()}
function renderGrid(){grid.innerHTML="";cells.forEach((c,i)=>{let d=document.createElement("div");d.className="cell";d.innerHTML=`<span class="beat">${Math.floor(i/4)+1}.${i%4+1}</span><div class="notes">${c.rest?"REST":c.notes.map(n=>notes[n].name).join("-")||"□"}</div><div class="dur">${c.symbol}</div>`;d.onclick=()=>place(i);grid.appendChild(d)})}
function place(i){if(eraseMode)cells[i]={notes:[],dur:selectedDur,symbol:selectedSymbol,rest:false};else if(restMode)cells[i]={notes:[],dur:selectedDur,symbol:selectedSymbol,rest:true};else if(stackMode){cells[i].rest=false;cells[i].dur=selectedDur;cells[i].symbol=selectedSymbol;if(!cells[i].notes.includes(selectedNote))cells[i].notes.push(selectedNote)}else cells[i]={notes:[selectedNote],dur:selectedDur,symbol:selectedSymbol,rest:false};update()}
function chordName(ns){let u=[...new Set(ns.map(n=>notes[n].name))],pcs=[...new Set(u.map(n=>pc[n]))].sort((a,b)=>a-b);for(const r of "CDEFGAB"){let root=pc[r],rel=pcs.map(p=>(p-root+12)%12).sort((a,b)=>a-b).join(",");if(rel=="0,4,7")return r+" major";if(rel=="0,3,7")return r+" minor";if(rel=="0,3,6")return r+" dim"}return u.length<2?"interval":"stack"}
function updateStats(){let beats=0,stacks=[];cells.forEach(c=>{if(c.notes.length||c.rest)beats+=c.dur;if(c.notes.length>1)stacks.push(chordName(c.notes))});let complete=beats===16;meter.innerHTML=`Measures: ${beats}/16 beats ${complete?'<span class="ok">✓</span>':'<span class="warn">keep going</span>'}`;harmony.textContent="Harmony stacks: "+(stacks.length?stacks.join(", "):"none yet");let score=(complete?40:0)+(cells.some(c=>c.dur===.5)?20:0)+(stacks.length?20:0)+(cells.filter(c=>c.notes.length).length>=6?20:0);quality.innerHTML=`Composition quality: ${score}/100 ${score>=80?'<span class="ok">strong</span>':''}`;coach.textContent=complete?"Music Nerd says: full four-measure trail complete!":"Music Nerd says: C4 is middle C; C6 uses two ledger lines above the staff."}
function update(){renderGrid();drawStaff();updateStats()}document.querySelectorAll(".note").forEach(b=>b.onclick=()=>{document.querySelectorAll(".note").forEach(x=>x.classList.remove("active"));b.classList.add("active");selectedNote=b.dataset.note;restMode=false;eraseMode=false});document.querySelectorAll(".rhythm").forEach(b=>b.onclick=()=>{document.querySelectorAll(".rhythm").forEach(x=>x.classList.remove("active"));b.classList.add("active");selectedDur=Number(b.dataset.dur);selectedSymbol=b.dataset.symbol});
restBtn.onclick=()=>{restMode=!restMode;eraseMode=false};eraseBtn.onclick=()=>{eraseMode=!eraseMode;restMode=false};stackBtn.onclick=()=>{stackMode=!stackMode;stackBtn.textContent="Harmony Stack: "+(stackMode?"ON":"OFF")};clearBtn.onclick=()=>{cells=Array.from({length:16},()=>({notes:[],dur:.5,symbol:"♪",rest:false}));update()};playBtn.onclick=()=>{let ac=new(window.AudioContext||window.webkitAudioContext)(),t=ac.currentTime;cells.forEach(c=>{let dur=.42*c.dur;if(!c.rest)c.notes.forEach(n=>{let o=ac.createOscillator(),g=ac.createGain();o.frequency.value=notes[n].freq;o.type="square";g.gain.setValueAtTime(.08,t);g.gain.exponentialRampToValueAtTime(.001,t+dur);o.connect(g).connect(ac.destination);o.start(t);o.stop(t+dur)});t+=dur})};update();
</script></body></html>
